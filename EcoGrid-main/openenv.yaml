name: eco-grid-openenv
version: 1.0.0
description: >
  RL environment for sustainable energy grid management. An agent balances
  renewable sources, fossil fuels, and battery storage to meet demand while
  minimising cost and carbon emissions.
author: "Team DD"
tags: [energy, sustainability, multi-objective, world-modeling, openenv]

observation_space:
  type: continuous
  fields:
    demand: {type: float, range: [0, 200], unit: MWh}
    solar_capacity: {type: float, range: [0, 1]}
    wind_capacity: {type: float, range: [0, 1]}
    battery_level: {type: float, range: [0, 1]}
    grid_stability: {type: float, range: [0, 1]}
    carbon_budget_remaining: {type: float, range: [0, 1000], unit: kgCO2}
    price_signal: {type: float, range: [0, 300], unit: $/MWh}
    time_step: {type: int, range: [0, 96]}

action_space:
  type: continuous
  fields:
    renewable_ratio: {type: float, range: [0, 1]}
    fossil_ratio: {type: float, range: [0, 1]}
    battery_action: {type: float, range: [-1, 1]}

reward_range: [0.0, 1.0]
episode_length: {easy: 48, medium: 96, hard: 96}

tasks:
  - name: easy
    id: basic_grid_balance
    description: Stable solar, flat demand, no battery. Goal — minimise cost.
    difficulty: 1
    grader: BasicGridBalanceGrader

  - name: medium
    id: renewable_variability
    description: Noisy solar+wind, demand spikes, small battery. Goal — avoid blackouts.
    difficulty: 2
    grader: RenewableVariabilityGrader

  - name: hard
    id: carbon_constrained
    description: Strict carbon cap, high volatility, limited storage. Episode ends on overrun.
    difficulty: 3
    grader: CarbonConstrainedGrader
